<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ page.title }} | {{ site.title }}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
  <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/contrib/auto-render.min.js"
    onload="renderMathInElement(document.body, {
      delimiters: [
        {left: '$$', right: '$$', display: true},
        {left: '\\[', right: '\\]', display: true},
        {left: '$', right: '$', display: false},
        {left: '\\(', right: '\\)', display: false}
      ],
      throwOnError: false
    });"></script>
  <script src="https://cdn.jsdelivr.net/npm/mermaid@10/dist/mermaid.min.js"></script>
  <script>mermaid.initialize({startOnLoad:true, theme:'dark'});</script>
  <style>
    :root {
      --bg-primary: #0d1117;
      --bg-secondary: #161b22;
      --bg-tertiary: #21262d;
      --text-primary: #e6edf3;
      --text-secondary: #8b949e;
      --text-muted: #6e7681;
      --border-color: #30363d;
      --accent: #58a6ff;
      --accent-hover: #79c0ff;
      --code-bg: #161b22;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background: var(--bg-primary);
      color: var(--text-primary);
      line-height: 1.7;
      font-size: 16px;
    }

    /* Layout */
    .container {
      display: grid;
      grid-template-columns: 1fr 260px;
      max-width: 1400px;
      margin: 0 auto;
      min-height: 100vh;
      padding: 0 2rem;
    }

    /* Main Content */
    .content {
      padding: 3rem 3rem 3rem 0;
      max-width: none;
    }

    .content h1 {
      font-size: 2.2rem;
      font-weight: 700;
      margin-bottom: 0.5rem;
      line-height: 1.3;
    }

    .meta {
      color: var(--text-secondary);
      margin-bottom: 2rem;
      padding-bottom: 1.5rem;
      border-bottom: 1px solid var(--border-color);
    }

    .content h2 {
      font-size: 1.6rem;
      font-weight: 600;
      margin: 2.5rem 0 1rem;
      padding-top: 1rem;
      border-top: 1px solid var(--border-color);
      color: var(--text-primary);
    }

    .content h3 {
      font-size: 1.25rem;
      font-weight: 600;
      margin: 2rem 0 0.75rem;
      color: var(--text-primary);
    }

    .content h4 {
      font-size: 1.1rem;
      font-weight: 600;
      margin: 1.5rem 0 0.5rem;
      color: var(--text-secondary);
    }

    .content p { margin-bottom: 1.2rem; }

    .content a {
      color: var(--accent);
      text-decoration: none;
    }

    .content a:hover {
      text-decoration: underline;
    }

    .content ul, .content ol {
      margin: 1rem 0 1.5rem 1.5rem;
    }

    .content li { margin-bottom: 0.4rem; }

    .content img {
      max-width: 100%;
      border-radius: 8px;
      margin: 1.5rem 0;
      border: 1px solid var(--border-color);
    }

    /* Tables */
    .content table {
      width: 100%;
      border-collapse: collapse;
      margin: 1.5rem 0;
      font-size: 0.9rem;
    }

    .content th, .content td {
      padding: 0.75rem 1rem;
      border: 1px solid var(--border-color);
      text-align: left;
    }

    .content th {
      background: var(--bg-tertiary);
      font-weight: 600;
    }

    .content tr:nth-child(even) {
      background: var(--bg-secondary);
    }

    /* Code */
    .content code {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.875rem;
      background: var(--code-bg);
      padding: 0.2rem 0.4rem;
      border-radius: 4px;
    }

    .content pre {
      background: var(--code-bg);
      border: 1px solid var(--border-color);
      border-radius: 8px;
      padding: 1rem 1.25rem;
      overflow-x: auto;
      margin: 1.5rem 0;
    }

    .content pre code {
      padding: 0;
      background: none;
    }

    /* Blockquotes */
    .content blockquote {
      border-left: 3px solid var(--accent);
      padding-left: 1rem;
      margin: 1.5rem 0;
      color: var(--text-secondary);
      font-style: italic;
    }

    /* TOC Sidebar */
    .toc {
      position: sticky;
      top: 0;
      height: 100vh;
      overflow-y: auto;
      padding: 2rem 1.5rem;
      border-left: 1px solid var(--border-color);
      font-size: 0.85rem;
    }

    .toc h3 {
      font-size: 0.75rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: var(--text-muted);
      margin-bottom: 1rem;
    }

    .toc ul {
      list-style: none;
    }

    .toc li {
      margin-bottom: 0.5rem;
    }

    .toc a {
      color: var(--text-secondary);
      text-decoration: none;
      display: block;
      padding: 0.2rem 0;
      transition: color 0.15s;
    }

    .toc a:hover {
      color: var(--accent);
    }

    .toc ul ul {
      margin-left: 1rem;
      margin-top: 0.3rem;
    }

    .toc ul ul a {
      font-size: 0.8rem;
    }

    /* HR */
    .content hr {
      border: none;
      border-top: 1px solid var(--border-color);
      margin: 2rem 0;
    }

    /* Responsive */
    @media (max-width: 900px) {
      .container {
        grid-template-columns: 1fr;
      }
      .toc {
        display: none;
      }
      .content {
        padding: 2rem;
        max-width: 100%;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <main class="content">
      {{ content }}
    </main>

    <aside class="toc">
      <h3>On this page</h3>
      <ul id="toc-list"></ul>
    </aside>
  </div>

  <script>
    // Generate TOC from headings
    const content = document.querySelector('.content');
    const tocList = document.getElementById('toc-list');
    const headings = content.querySelectorAll('h2, h3');

    headings.forEach((heading, index) => {
      if (!heading.id) {
        heading.id = 'section-' + index;
      }
      const li = document.createElement('li');
      const a = document.createElement('a');
      a.href = '#' + heading.id;
      a.textContent = heading.textContent;
      li.appendChild(a);

      if (heading.tagName === 'H3') {
        let parent = tocList.lastElementChild;
        if (parent) {
          let subList = parent.querySelector('ul');
          if (!subList) {
            subList = document.createElement('ul');
            parent.appendChild(subList);
          }
          subList.appendChild(li);
        } else {
          tocList.appendChild(li);
        }
      } else {
        tocList.appendChild(li);
      }
    });
  </script>
  <script data-goatcounter="https://kvxxccs.goatcounter.com/count" async src="//gc.zgo.at/count.js"></script>
</body>
</html>
